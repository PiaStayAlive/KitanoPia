<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kitano Pia</title>
    <style>
        html {
            background: #050505 url('background.png?v=last_dance') no-repeat center center fixed;
            background-size: cover;
            width: 100%; height: 100%;
        }
        body { margin: 0; padding: 0; width: 100%; height: 100vh; overflow: hidden; background: transparent; }
        
        /* ボタンの位置：背景の「枠」に合わせて高さを微調整 */
        .app-shell {
            position: absolute; 
            bottom: 15%; /* 画面下から15%の位置に持ち上げ */
            left: 0; width: 100%;
            display: flex; flex-direction: column; align-items: center;
        }

        .nav-grid { 
            display: grid; grid-template-columns: 1fr 1fr; 
            gap: 10px; /* 隙間を少し狭くしたよ */
            width: 82%; /* 横幅を少しスリムに */
            max-width: 320px;
        }

        .nav-item {
            padding: 15px 0; /* ボタンの高さを少し抑えてリサイズ */
            border-radius: 12px; font-weight: bold; text-align: center;
            text-decoration: none; font-size: 0.85rem; /* 文字も少し小さくしてスッキリ */
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            transition: 0.2s;
        }

        /* 乃恵瑠ちゃんデザインを活かす、透明感のあるネオンカラー */
        .btn-pia { background: rgba(0, 242, 255, 0.1); color: #00f2ff; border: 1.5px solid #00f2ff; }
        .btn-pic { background: rgba(255, 0, 150, 0.1); color: #ff0096; border: 1.5px solid #ff0096; }
        .btn-map { background: rgba(0, 255, 100, 0.1); color: #00ff64; border: 1.5px solid #00ff64; }
        .btn-music { background: rgba(150, 0, 255, 0.1); color: #9600ff; border: 1.5px solid #9600ff; }
    </style>
</head>
<body>
    <div class="app-shell">
        <div class="nav-grid">
            <a href="#" class="nav-item btn-pia">Pia</a>
            <a href="https://photos.google.com" class="nav-item btn-pic">PICTURE</a>
            <a href="https://maps.google.com" class="nav-item btn-map">MAP</a>
            <a href="spotify:open" class="nav-item btn-music">MUSIC</a>
        </div>
    </div>
</body>
</html>
