<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kitano Pia</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; overflow: hidden; }
        .bg-container {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: url('background.png') no-repeat center center / cover;
            z-index: -1;
        }
        .app-shell {
            display: flex; flex-direction: column; align-items: center;
            justify-content: flex-end; height: 100vh; padding-bottom: 60px; box-sizing: border-box;
        }
        .nav-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 85%; }
        .nav-item {
            padding: 20px 0; border-radius: 15px; font-weight: bold; text-align: center;
            text-decoration: none; border: 2px solid rgba(255,255,255,0.3);
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); color: #fff;
        }
    </style>
</head>
<body>
    <div class="bg-container"></div>
    <div class="app-shell">
        <div class="nav-grid">
            <a href="#" class="nav-item">Pia</a>
            <a href="#" class="nav-item">PICTURE</a>
            <a href="#" class="nav-item">MAP</a>
            <a href="#" class="nav-item">MUSIC</a>
        </div>
    </div>
</body>
</html>
