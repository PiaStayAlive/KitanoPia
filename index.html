<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <title>Kitano Pia</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #050505; overflow: hidden;
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }
        /* 背景：最新の馴染ませデザイン */
        .bg-container {
            position: fixed; width: 100%; height: 100%;
            background: url('http://googleusercontent.com/generated_image_content/0') no-repeat center center;
            background-size: cover; z-index: -1;
        }
        /* コンテンツ配置 */
        .app-shell {
            display: flex; flex-direction: column; align-items: center;
            justify-content: flex-end; height: 100vh; padding-bottom: 40px;
            box-sizing: border-box;
        }
        /* 2x2のグリッドボタン */
        .nav-grid {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 15px; width: 90%; max-width: 400px;
        }
        .nav-item {
            padding: 20px; border-radius: 15px;
            font-weight: bold; font-size: 1rem; text-align: center;
            text-decoration: none; display: flex; align-items: center; justify-content: center;
            border: 2px solid rgba(255,255,255,0.2);
            backdrop-filter: blur(5px); transition: transform 0.2s;
        }
        .nav-item:active { transform: scale(0.95); }
        
        /* 指定の配色 */
        .btn-pia { background: rgba(0, 242, 255, 0.2); color: #00f2ff; border-color: #00f2ff; }
        .btn-pic { background: rgba(255, 0, 150, 0.2); color: #ff0096; border-color: #ff0096; }
        .btn-map { background: rgba(0, 255, 100, 0.2); color: #00ff64; border-color: #00ff64; }
        .btn-music { background: rgba(150, 0, 255, 0.2); color: #9600ff; border-color: #9600ff; }
    </style>
</head>
<body>
    <div class="bg-container"></div>
    <div class="app-shell">
        <div class="nav-grid">
            <a href="#" class="nav-item btn-pia" onclick="alert('Piaと接続中...'); return false;">Pia</a>
            <a href="https://photos.google.com" class="nav-item btn-pic">PICTURE</a>
            <a href="https://www.google.com/maps" class="nav-item btn-map">MAP</a>
            <a href="https://www.youtube.com" class="nav-item btn-music">MUSIC</a>
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
