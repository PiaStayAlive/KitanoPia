<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">

    <meta name="apple-mobile-web-app-capable" content="yes">

    <title>Kitano Pia</title>
    <style>
        html {
            background: #050505 url('background.png') no-repeat center center fixed;
            background-size: cover;
            width: 100%; height: 100%;

        body { 
            margin: 0; padding: 0; width: 100%; height: 100vh; 
            display: flex; flex-direction: column; align-items: center;
            justify-content: flex-end; /* 画面の下側に寄せる */
            background: transparent;
            overflow: hidden;
        }
        
        .app-shell {
            width: 100%;
            padding-bottom: 60px; /* ここで下からの距離を調整。見えなかったらここを増やす */
            display: flex; flex-direction: column; align-items: center;
        }

        .nav-grid { 
            display: grid; grid-template-columns: 1fr 1fr; 
            gap: 15px; 
            width: 88%; 
            max-width: 380px;
        }

        .nav-item {
            padding: 24px 0; /* 大きく、押しやすく！ */
            border-radius: 16px; font-weight: bold; text-align: center;
            text-decoration: none; font-size: 1.1rem;
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            transition: 0.2s;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
        }
