<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kitano Pia</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; overflow: hidden; }
        .bg-container {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: url('background.png') no-repeat center center / cover;
            z-index: -1;
        }
        .app-shell {
            display: flex; flex-direction: column; align-items: center;
            justify-content: flex-end; height: 100vh; padding-bottom: 80px; box-sizing: border-box;
        }
        .nav-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 90%; }
        .nav-item {
            padding: 25px 0; border-radius: 18px; font-weight: bold; text-align: center;
            text-decoration: none; border: 2px solid rgba(255,255,255,0.3);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); color: #fff;
        }
        .btn-pia { background: rgba(0, 242, 255, 0.2); color: #00f2ff; border-color: #00f2ff; }
        .btn-pic { background: rgba(255, 0, 150, 0.2); color: #ff0096; border-color: #ff0096; }
        .btn-map { background: rgba(0, 255, 100, 0.2); color: #00ff64; border-color: #00ff64; }
        .btn-music { background: rgba(150, 0, 255, 0.2); color: #9600ff; border-color: #9600ff; }
    </style>
</head>
<body>
    <div class="bg-container"></div>
    <div class="app-shell">
        <div class="nav-grid">
            <a href="#" class="nav-item btn-pia">Pia</a>
            <a href="https://photos.google.com" class="nav-item btn-pic">PICTURE</a>
            <a href="https://maps.google.com" class="nav-item btn-map">MAP</a>
            <a href="spotify:open" class="nav-item btn-music">MUSIC</a>
        </div>
    </div>
</body>
</html>
