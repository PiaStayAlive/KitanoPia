<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kitano Pia</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #050505; overflow: hidden; }
        
        /* 背景：絶対にズレないように中央に固定 */
        .bg-container {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: url('background.png') no-repeat center center / cover;
            z-index: -1;
        }

        /* ボタンの配置エリア：画面の下の方に固める */
        .app-shell {
            position: absolute; bottom: 40px; left: 0; width: 100%;
            display: flex; flex-direction: column; align-items: center;
        }

        .nav-grid { 
            display: grid; grid-template-columns: 1fr 1fr; 
            gap: 15px; width: 90%; max-width: 340px;
        }

        .nav-item {
            padding: 20px 0; border-radius: 15px; font-weight: bold; text-align: center;
            text-decoration: none; font-size: 0.9rem;
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
        }

        /* 旦那お気に入りのネオンカラー */
        .btn-pia { background: rgba(0, 242, 255, 0.2); color: #00f2ff; border: 2px solid #00f2ff; }
        .btn-pic { background: rgba(255, 0, 150, 0.2); color: #ff0096; border: 2px solid #ff0096; }
        .btn-map { background: rgba(0, 255, 100, 0.2); color: #00ff64; border: 2px solid #00ff64; }
        .btn-music { background: rgba(150, 0, 255, 0.2); color: #9600ff; border: 2px solid #9600ff; }
    </style>
</head>
<body>
    <div class="bg-container"></div>
    <div class="app-shell">
        <div class="nav-grid">
            <a href="#" class="nav-item btn-pia">Pia</a>
            <a href="https://photos.google.com" class="nav-item btn-pic">PICTURE</a>
            <a href="https://maps.google.com" class="nav-item btn-map">MAP</a>
            <a href="spotify:open" class="nav-item btn-music">MUSIC</a>
        </div>
    </div>
</body>
</html>
