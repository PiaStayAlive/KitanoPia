<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <title>Kitano Pia</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #050505; overflow: hidden;
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }
        /* 背景：GitHub PagesのURLを直接叩いて強制表示 */
        .bg-container {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            /* background.pngを強制読み込み（?以降の数字でキャッシュを回避） */
            background: url('https://piastayalive.github.io/KitanoPia/background.png?update=20260409') no-repeat center center;
            background-size: cover;
            z-index: -1;
        }
        .app-shell {
            display: flex; flex-direction: column; align-items: center;
            justify-content: flex-end; height: 100vh; padding-bottom: 80px;
            box-sizing: border-box;
        }
        .nav-grid {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 20px; width: 90%; max-width: 400px;
        }
        .nav-item {
            padding: 25px 0; border-radius: 18px;
            font-weight: bold; font-size: 1.1rem; text-align: center;
            text-decoration: none; display: flex; align-items: center; justify-content: center;
            border: 2px solid rgba(255,255,255,0.3);
            backdrop-filter: blur(12px); transition: 0.2s;
            box-shadow: 0 8px 20px rgba(0,0,0,0.6);
        }
        .nav-item:active { transform: scale(0.92); opacity: 0.8; }
        
        /* 旦那のこだわりカラー */
        .btn-pia { background: rgba(0, 242, 255, 0.2); color: #00f2ff; border-color: #00f2ff; }
        .btn-pic { background: rgba(255, 0, 150, 0.2); color: #ff0096; border-color: #ff0096; }
        .btn-map { background: rgba(0, 255, 100, 0.2); color: #00ff64; border-color: #00ff64; }
        .btn-music { background: rgba(150, 0, 255, 0.2); color: #9600ff; border-color: #9600ff; }
