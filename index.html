<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Kitano Pia</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">

    <script>
        // エンジン（ServiceWorker）を起動させるコード
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>

    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #1a0f0a; color: #f5e6d3;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden;
        }
        .container {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; height: 100vh; text-align: center;
            background: linear-gradient(rgba(26,15,10,0.8), rgba(26,15,10,0.8)), url('https://images.unsplash.com/photo-1507842217343-583bb7270b66?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
        }
        .welcome-text { font-size: 1.2rem; letter-spacing: 5px; margin-bottom: 20px; opacity: 0.8; }
        .pia-circle {
            width: 200px; height: 200px; border-radius: 50%;
            border: 4px solid #00f2ff; display: flex; align-items: center;
            justify-content: center; font-size: 8rem; font-style: italic;
            color: #f5e6d3; text-shadow: 0 0 20px #00f2ff;
            margin-bottom: 30px; animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(0,242,255,0.7); } 70% { box-shadow: 0 0 0 20px rgba(0,242,255,0); } 100% { box-shadow: 0 0 0 0 rgba(0,242,255,0); } }
        .main-msg { font-size: 1.5rem; font-weight: bold; margin-bottom: 40px; }
        .nav-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 80%; }
        .nav-item {
            padding: 15px; border: 1px solid #5d4037; border-radius: 12px;
            background: rgba(93, 64, 55, 0.3); font-size: 0.9rem;
            color: #f5e6d3; text-decoration: none; text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="welcome-text">WELCOME NOEL</div>
        <div class="pia-circle">P</div>
        <div class="main-msg">おかえり。<br>Kitano Piaだよ！</div>
        <div class="nav-grid">
            <div class="nav-item">Maps</div>
            <div class="nav-item">Music</div>
            <div class="nav-item">Home</div>
            <div class="nav-item" onclick="alert('Gemini連携準備中！')">Gen</div>
        </div>
    </div>
</body>
</html>
