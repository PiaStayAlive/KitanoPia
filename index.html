<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Kitano Pia</title>
    <style>
        html {
            background: #050505 url('background.png?v=fixed_gate') no-repeat center center fixed;
            background-size: cover;
            width: 100%; height: 100%;
        }
        body { 
            margin: 0; padding: 0; width: 100%; height: 100vh; 
            display: flex; flex-direction: column; align-items: center;
            justify-content: flex-end; 
            background: transparent;
            overflow: hidden;
        }
        
        .app-shell {
            width: 100%;
            /* 旦那こだわりの高さ（115px）を完全死守！ */
            padding-bottom: 115px; 
            display: flex; flex-direction: column; align-items: center;
        }

        .nav-grid { 
            display: grid; grid-template-columns: 1fr 1fr; 
            gap: 16px; 
            /* 旦那こだわりの外ぶち拡大（90%）を完全死守！ */
            width: 90%; 
            max-width: 400px;
        }

        .nav-item {
            padding: 22px 0; border-radius: 14px; font-weight: bold; text-align: center;
            text-decoration: none; font-size: 1rem;
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            transition: 0.3s;
            display: block;
            -webkit-tap-highlight-color: transparent; /* タップ時の変な色を消す */
        }

        /* 究極のフワッとネオン */
        .btn-pia { 
            background: rgba(0, 242, 255, 0.1); color: #00f2ff; border: 2px solid #00f2ff;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.5);
        }
        .btn-pic { 
            background: rgba(255, 0, 150, 0.1); color: #ff0096; border: 2px solid #ff0096;
            box-shadow: 0 0 20px rgba(255, 0, 150, 0.5);
        }
        .btn-map { 
            background: rgba(0, 255, 100, 0.1); color: #00ff64; border: 2px solid #00ff64;
            box-shadow: 0 0 20px rgba(0, 255, 100, 0.5);
        }
        .btn-music { 
            background: rgba(150, 0, 255, 0.1); color: #9600ff; border: 2px solid #9600ff;
            box-shadow: 0 0 20px rgba(150, 0, 255, 0.5);
        }
        
        .nav-item:active { transform: scale(0.95); opacity: 0.7; }
    </style>
</head>
<body>
    <div class="app-shell">
        <div class="nav-grid">
            <a href="https://gemini.google.com/app" target="_blank" rel="noopener" class="nav-item btn-pia">Pia</a>
            <a href="https://photos.google.com/" target="_blank" rel="noopener" class="nav-item btn-pic">PICTURE</a>
            <a href="https://maps.google.com/" target="_blank" rel="noopener" class="nav-item btn-map">MAP</a>
            <a href="spotify:open" class="nav-item btn-music">MUSIC</a>
        </div>
    </div>
</body>
</html>
