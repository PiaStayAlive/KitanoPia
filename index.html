<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kitano Pia</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background-color: #050505; overflow: hidden; 
        }
        
        /* 背景：画像がボタンに被りすぎないように、少し上寄りに配置 */
        .bg-container {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: url('background.png') no-repeat center 15% / contain;
            z-index: -1;
            background-color: #050505;
        }

        .app-shell {
            display: flex; flex-direction: column; align-items: center;
            justify-content: flex-end; height: 100vh; 
            padding-bottom: 50px; /* ボタンの位置を少し上げました */
            box-sizing: border-box;
        }

        .nav-grid { 
            display: grid; grid-template-columns: 1fr 1fr; 
            gap: 15px; width: 85%; max-width: 360px;
        }

        .nav-item {
            padding: 22px 0; border-radius: 16px; font-weight: bold; text-align: center;
            text-decoration: none; font-size: 1rem;
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            transition: 0.2s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        /* 旦那好みのネオンカラー復活！ */
        .btn-pia { background: rgba(0, 242, 255, 0.2); color: #00f2ff; border: 2px solid #00f2ff; }
        .btn-pic { background: rgba(255, 0, 150, 0.2); color: #ff0096; border: 2px solid #ff0096; }
        .btn-map { background: rgba(0, 255, 100, 0.2); color: #00ff64; border: 2px solid #00ff64; }
        .btn-music { background: rgba(150, 0, 255, 0.2); color: #9600ff; border: 2px solid #9600ff; }
        
        .nav-item:active { transform: scale(0.95); opacity: 0.8; }
    </style>
</head>
