<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Kitano Pia</title>
    <style>
        html {
            background: #050505 url('background.png') no-repeat center center fixed;
            background-size: cover;
            width: 100%; height: 100%;
        }
        body { margin: 0; padding: 0; width: 100%; height: 100vh; overflow: hidden; background: transparent; }
        
        .app-shell {
            position: absolute; 
            bottom: 8%; /* ボタンをさらに少し下げてバランス調整 */
            left: 0; width: 100%;
            display: flex; flex-direction: column; align-items: center;
        }

        .nav-grid { 
            display: grid; grid-template-columns: 1fr 1fr; 
            gap: 15px; 
            width: 85%; /* 少しだけ横幅を広げて大きくしたよ */
            max-width: 360px;
        }

        .nav-item {
            padding: 22px 0; /* ボタンの高さを出して、押しやすく大きくしたよ */
            border-radius: 15px; font-weight: bold; text-align: center;
            text-decoration: none; font-size: 1rem;
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            transition: 0.2s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }
