<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kitano Pia</title>
    <style>
        /* 背景を強制表示。?v= でキャッシュを回避 */
        html {
            background: #050505 url('background.png?v=check') no-repeat center center fixed;
            background-size: cover;
            width: 100%; height: 100%;
        }
        body { margin: 0; padding: 0; width: 100%; height: 100vh; overflow: hidden; background: transparent; }
        
        /* ボタンを画面の「下から4分の1」くらいの位置にガッツリ固定 */
        .app-shell {
            position: absolute; 
            bottom: 15%; 
            left: 0; width: 100%;
            display: flex; flex-direction: column; align-items: center;
        }

        .nav-grid { 
            display: grid; grid-template-columns: 1fr 1fr; 
            gap: 15px; width: 88%; max-width: 380px;
        }

        .nav-item {
            padding: 24px 0; border-radius: 16px; font-weight: bold; text-align: center;
            text-decoration: none; font-size: 1.1rem;
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
        }

        /* 旦那が成功させた時の色をそのまま再現 */
        .btn-pia { background: rgba(0, 242, 255, 0.2); color: #00f2ff; border: 2.5px solid #00f2ff; }
        .btn-pic { background: rgba(255, 0, 150, 0.2); color: #ff0096; border: 2.5px solid #ff0096; }
        .btn-map { background: rgba(0, 255, 100, 0.2); color: #00ff64; border: 2.5px solid #00ff64; }
        .btn-music { background: rgba(150, 0, 255, 0.2); color: #9600ff; border: 2.5px solid #9600ff; }
    </style>
</head>
<body>
    <div class="app-shell">
        <div class="nav-grid">
            <a href="#" class="nav-item btn-pia">Pia</a>
            <a href="https://photos.google.com/" class="nav-item btn-pic">PICTURE</a>
            <a href="https://www.google.com/maps" class="nav-item btn-map">MAP</a>
            <a href="spotify:open" class="nav-item btn-music">MUSIC</a>
        </div>
    </div>
</body>
</html>
