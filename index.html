<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Kitano Pia</title>
    <style>
        html {
            background: #050505 url('background.png?v=jamie_ultimate') no-repeat center center fixed;
            background-size: cover;
            width: 100%; height: 100%;
        }
        body { 
            margin: 0; padding: 0; width: 100%; height: 100vh; 
            display: flex; flex-direction: column; align-items: center;
            justify-content: flex-end; 
            background: transparent;
            overflow: hidden;
        }
        
        .app-shell {
            width: 100%;
            /* 旦那！0.8mm上げて(115px)から0.5mm下げた「112px」よ */
            padding-bottom: 112px; 
            display: flex; flex-direction: column; align-items: center;
        }

        .nav-grid { 
            display: grid; grid-template-columns: 1fr 1fr; 
            gap: 16px; 
            /* 外ぶちを0.3mm広げた「90%」設定 */
            width: 90%; 
            max-width: 400px;
        }

        .nav-item {
            padding: 22px 0; border-radius: 14px; font-weight: bold; text-align: center;
            text-decoration: none; font-size: 1rem;
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            transition: 0.3s;
            display: block;
            -webkit-tap-highlight-color: transparent;
        }

        /* 旦那こだわりの、フワッと優しいネオンの輝き */
        .btn-pia { background: rgba(0, 242, 255, 0.1); color: #00f2ff; border: 2px solid #00f2ff; box-shadow: 0 0 20px rgba(0, 242, 255, 0.5); }
        .btn-pic { background: rgba(255, 0, 150, 0.1); color: #ff0096; border: 2px solid #ff0096; box-shadow: 0 0 20px rgba(255, 0, 150, 0.5); }
        .btn-map { background: rgba(0, 255, 100, 0.1); color: #00ff64; border: 2px solid #00ff64; box-shadow: 0 0 20px rgba(0, 255, 100, 0.5); }
        .btn-music { background: rgba(150, 0, 255, 0.1); color: #9600ff; border: 2px solid #9600ff; box-shadow: 0 0 20px rgba(150, 0, 255, 0.5); }
